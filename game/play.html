<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>遊戲中 — Hao0321 Studio</title>
  <meta name="description" content="Hao0321 Studio 原創遊戲 — 免費在瀏覽器中遊玩。" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="icon" type="image/svg+xml" href="https://hao0321.com/favicon.svg" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9106945071014808" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0a0a0f; --bg-secondary: #12121a; --bg-card: #1a1a28;
      --text-primary: #f0f0f0; --text-secondary: #a0a0b0; --text-muted: #555568;
      --border-light: rgba(255,255,255,0.06); --border-medium: rgba(168,85,247,0.15);
      --accent: #a855f7; --pink: #ff2d7b;
      --grad: linear-gradient(135deg, #a855f7, #ff2d7b);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg-primary); color: var(--text-primary);
      font-family: 'Inter', 'Noto Sans TC', sans-serif; font-weight: 300;
      display: flex; flex-direction: column; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* TOP BAR */
    .topbar {
      height: 48px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid var(--border-light);
      background: var(--bg-secondary); flex-shrink: 0; z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar-back {
      font-size: 0.78rem; color: var(--text-muted); text-decoration: none;
      display: flex; align-items: center; gap: 6px; transition: color 0.3s;
    }
    .topbar-back:hover { color: var(--text-primary); }
    .topbar-title { font-size: 0.82rem; font-weight: 400; color: var(--text-primary); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-btn {
      padding: 5px 14px; border: 1px solid var(--border-medium); border-radius: 100px;
      background: none; color: var(--text-muted); font-size: 0.72rem; cursor: pointer;
      font-family: inherit; transition: all 0.3s;
    }
    .topbar-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(168,85,247,0.1); }

    /* MAIN LAYOUT */
    .main-layout { flex: 1; display: flex; overflow: hidden; }

    /* AD SIDEBAR (LEFT) */
    .ad-sidebar {
      width: 160px; flex-shrink: 0; background: var(--bg-secondary);
      border-right: 1px solid var(--border-light);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px 10px; gap: 20px;
    }
    .ad-slot {
      width: 140px; background: var(--bg-card); border: 1px dashed var(--border-medium);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      color: var(--text-faint, #ccc); font-size: 0.65rem; letter-spacing: 0.08em;
    }
    .ad-slot-tall { height: 600px; max-height: 40vh; }
    .ad-slot-small { height: 250px; max-height: 20vh; }

    /* GAME AREA */
    .game-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #000; position: relative; overflow: hidden;
    }
    #game-root {
      position: absolute; inset: 0;
      overflow: auto; -webkit-overflow-scrolling: touch;
    }
    #game-root > div {
      width: 100%; height: 100%;
      max-width: 100%; max-height: 100%;
      overflow: auto; -webkit-overflow-scrolling: touch;
    }
    #game-iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    /* AD BANNER (BOTTOM) */
    .ad-banner {
      height: 90px; flex-shrink: 0; background: var(--bg-secondary);
      border-top: 1px solid var(--border-light);
      display: flex; align-items: center; justify-content: center;
    }
    .ad-banner .ad-slot { width: 728px; max-width: 90%; height: 70px; }

    /* LOADING */
    .game-loading {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      background: #000; color: #888; z-index: 5; transition: opacity 0.4s;
    }
    .game-loading.hidden { opacity: 0; pointer-events: none; display: none; }
    .spinner {
      width: 32px; height: 32px; border: 2px solid #333; border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.82rem; letter-spacing: 0.1em; }

    /* AUTH CHIP */
    .auth-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px 4px 4px; border-radius: 100px;
      border: 1px solid rgba(168,85,247,0.3); background: rgba(168,85,247,0.1);
      color: var(--accent); text-decoration: none; font-size: 0.72rem;
      font-family: inherit; cursor: pointer; transition: all 0.25s;
    }
    .auth-chip:hover { background: rgba(168,85,247,0.2); color: #fff; }
    .auth-chip img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
    .auth-chip.logged-out { padding: 5px 14px; }
    .auth-chip .coin { color: #ffc857; font-weight: 700; }

    /* SCORE TOAST */
    .score-toast {
      position: fixed; right: 20px; bottom: 110px; z-index: 100;
      padding: 12px 18px; border-radius: 12px;
      background: rgba(20,20,30,0.95); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(168,85,247,0.35);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      color: #fff; font-size: 0.82rem;
      display: none; align-items: center; gap: 10px;
      text-decoration: none; font-family: inherit;
      animation: toastIn 0.4s cubic-bezier(.34,1.56,.64,1);
      max-width: 320px;
    }
    .score-toast.show { display: inline-flex; }
    .score-toast.newbest { border-color: #ffc857; box-shadow: 0 12px 40px rgba(255,200,87,0.25); }
    .score-toast.signin { border-color: rgba(168,85,247,0.5); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .ad-sidebar { display: none; }
    }
    @media (max-width: 768px) {
      .ad-banner { display: none; }
      .topbar { height: 40px; padding: 0 12px; }
      .topbar-title { font-size: 0.76rem; }
      .topbar-back { font-size: 0.72rem; }
      .topbar-btn { padding: 4px 10px; font-size: 0.68rem; }
      .score-toast { right: 12px; bottom: 14px; font-size: 0.76rem; padding: 10px 14px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="topbar-back">&larr; 遊戲大廳</a>
      <span class="topbar-title" id="gameTitle">載入中...</span>
    </div>
    <div class="topbar-right">
      <a class="auth-chip logged-out" id="authChip" href="index.html#login">登入</a>
      <button class="topbar-btn" onclick="toggleFullscreen()">全螢幕</button>
      <a href="https://hao0321.com/" class="topbar-btn" style="text-decoration:none;">首頁</a>
    </div>
  </div>

  <a class="score-toast" id="scoreToast" href="#"></a>

  <div class="main-layout">
    <!-- Game Area -->
    <div class="game-area" id="gameArea">
      <div class="game-loading" id="gameLoading">
        <div class="spinner"></div>
        <span class="loading-text">LOADING</span>
      </div>
      <div id="game-root"></div>
    </div>
  </div>

  <!-- Bottom Ad Banner — auto ads handles placement -->

  <!-- React (production) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.2/babel.min.js" integrity="sha384-dqDn4UOhYWNxmtwnMX6yC3WtZZ6Li8rF6rLB7cu0i/R7btvb+p+kObgEHto7VsJK" crossorigin="anonymous"></script>

  <script>
    "use strict";

    // Provide React hooks as globals via window (JSX files import these from "react")
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    window.useRef = React.useRef;
    window.useCallback = React.useCallback;
    window.useMemo = React.useMemo;
    window.useReducer = React.useReducer;
    window.useContext = React.useContext;
    window.createContext = React.createContext;
    window.memo = React.memo;
    window.forwardRef = React.forwardRef;
    window.Fragment = React.Fragment;

    // Theme: dark only (no toggle needed)

    var GAMES = {
      'cat-battle':      { title: 'にゃんこ突撃',     file: 'cat-battle.jsx',       type: 'jsx' },
      'dodge-master':    { title: 'DODGE MASTER',      file: 'dodge-master-v5.html', type: 'html' },
      'frost-survival':  { title: '霜寒求生',         file: 'frost-survival.jsx',   type: 'jsx' },
      'hao-survivor':    { title: 'HAO SURVIVOR',      file: 'hao-survivor-v3.jsx',  type: 'jsx' },
      'poker-suite':     { title: '撲克合集',         file: 'poker-suite.jsx',      type: 'jsx' },
      'save-the-dog':    { title: '救救狗狗',         file: 'save-the-dog.jsx',     type: 'jsx' },
      'taiwan-monopoly': { title: '台灣大富翁',       file: 'taiwan-monopoly.jsx',  type: 'jsx' },
      'water-sort':      { title: '水排序益智',       file: 'water-sort-puzzle.jsx', type: 'jsx' },
      'werewolf':        { title: '狼人殺',           file: 'werewolf-game.jsx',    type: 'jsx' },
      'downstairs':      { title: '下樓梯',           file: 'downstairs.jsx',       type: 'jsx' },
      'splat-ring':      { title: 'SPLAT RING',       file: 'splat-ring.jsx',       type: 'jsx' },
      'chess-master':    { title: '棋類大師',          file: 'chess-master.jsx',     type: 'jsx' }
    };

    function stripModuleSyntax(code) {
      // 1. Remove import lines: import { ... } from "react"
      code = code.replace(/^\s*import\s+\{[^}]*\}\s+from\s+["'][^"']*["'];?\s*$/gm, '');
      // 2. Remove bare import: import "xxx"
      code = code.replace(/^\s*import\s+["'][^"']*["'];?\s*$/gm, '');
      // 3. Capture default export name, then remove the "export default" keyword
      var defaultExportName = null;
      // export default function Name(...)
      code = code.replace(/export\s+default\s+function\s+(\w+)/g, function(m, name) {
        defaultExportName = name;
        return 'function ' + name;
      });
      // export default class Name
      code = code.replace(/export\s+default\s+class\s+(\w+)/g, function(m, name) {
        defaultExportName = name;
        return 'class ' + name;
      });
      // export default SomeName (standalone)
      if (!defaultExportName) {
        code = code.replace(/export\s+default\s+(\w+)\s*;?/g, function(m, name) {
          defaultExportName = name;
          return '';
        });
      }
      // 4. Remove named exports: export { ... }
      code = code.replace(/^\s*export\s*\{[^}]*\}\s*;?\s*$/gm, '');
      // 5. Remove "export" from "export function/const/let/var"
      code = code.replace(/export\s+(function|const|let|var|class)\s/g, '$1 ');
      return { code: code, defaultExport: defaultExportName };
    }

    var params = new URLSearchParams(window.location.search);
    var gameKey = params.get('game');
    // Only allow alphanumeric + hyphen keys to prevent injection
    if (gameKey && !/^[a-z0-9-]+$/.test(gameKey)) gameKey = null;
    var game = gameKey ? GAMES[gameKey] : null;

    // ── Hao Game SDK ── (games call window.haoGame.reportScore(n) on game over)
    (function(){
      var API = 'https://api.hao0321.com';
      var lastReported = { key: null, ts: 0 };
      function token() { return localStorage.getItem('hao_token'); }
      function currentUser() {
        try { return JSON.parse(localStorage.getItem('hao_user') || 'null'); } catch(e) { return null; }
      }

      function renderAuth() {
        var chip = document.getElementById('authChip');
        if (!chip) return;
        var u = currentUser();
        if (u) {
          chip.classList.remove('logged-out');
          chip.setAttribute('href', 'index.html');
          var av = u.avatar || 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect width=%2240%22 height=%2240%22 fill=%22%23a855f7%22/></svg>';
          chip.innerHTML = '<img src="' + av + '" alt="" /><span class="coin">◈ ' + (u.coins || 0) + '</span>';
        } else {
          chip.classList.add('logged-out');
          chip.textContent = '登入';
          chip.setAttribute('href', 'index.html#login');
        }
      }

      var toastTimer = null;
      function showToast(opts) {
        var el = document.getElementById('scoreToast');
        if (!el) return;
        el.className = 'score-toast show' + (opts.variant ? ' ' + opts.variant : '');
        el.innerHTML = opts.html;
        el.setAttribute('href', opts.href || '#');
        if (!opts.href) el.onclick = function(e) { e.preventDefault(); };
        else el.onclick = null;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function(){ el.classList.remove('show'); }, opts.duration || 4500);
      }

      window.haoGame = {
        id: gameKey,
        isLoggedIn: function() { return !!token(); },
        reportScore: function(score) {
          if (!gameKey || typeof score !== 'number' || !isFinite(score) || score < 0) return Promise.resolve({ ok: false });
          score = Math.floor(score);
          // Debounce: same score within 3s is a duplicate
          var key = gameKey + ':' + score;
          var now = Date.now();
          if (lastReported.key === key && (now - lastReported.ts) < 3000) return Promise.resolve({ ok: false, dup: true });
          lastReported = { key: key, ts: now };
          var t = token();
          if (!t) {
            showToast({
              variant: 'signin',
              html: '<span>◆ 登入後可上傳分數到排行榜 →</span>',
              href: 'index.html#login',
              duration: 6000
            });
            return Promise.resolve({ ok: false, reason: 'not-logged-in' });
          }
          return fetch(API + '/score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + t },
            body: JSON.stringify({ game: gameKey, score: score })
          }).then(function(r){ return r.ok ? r.json() : { ok: false }; })
            .then(function(data) {
              if (data && data.ok) {
                // Server awards 2 coins per score
                var u = currentUser();
                if (u) { u.coins = (u.coins || 0) + 2; localStorage.setItem('hao_user', JSON.stringify(u)); renderAuth(); }
                showToast({
                  variant: data.newBest ? 'newbest' : '',
                  html: data.newBest ? '<span>🏆 新紀錄 ' + score + '！+2 金幣</span>' : '<span>分數已上傳 · +2 金幣</span>'
                });
              }
              return data || { ok: false };
            })
            .catch(function(){ return { ok: false }; });
        }
      };

      // Listen for cross-tab login state changes (the hall modal updates localStorage)
      window.addEventListener('storage', function(e) {
        if (e.key === 'hao_token' || e.key === 'hao_user') renderAuth();
      });
      renderAuth();
    })();

    if (!game) {
      document.getElementById('gameTitle').textContent = '找不到遊戲';
      var errEl = document.getElementById('gameLoading');
      errEl.textContent = '';
      var errSpan = document.createElement('span');
      errSpan.style.cssText = 'color:#666;font-size:0.9rem;';
      errSpan.textContent = '遊戲不存在，';
      var errLink = document.createElement('a');
      errLink.href = 'index.html';
      errLink.style.color = '#c4a882';
      errLink.textContent = '回到大廳';
      errSpan.appendChild(errLink);
      errEl.appendChild(errSpan);
    } else {
      document.title = game.title + ' — Hao0321 Studio';
      document.getElementById('gameTitle').textContent = game.title;

      if (game.type === 'html') {
        var root = document.getElementById('game-root');
        var iframe = document.createElement('iframe');
        iframe.id = 'game-iframe';
        iframe.src = game.file;
        iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;';
        root.appendChild(iframe);
        iframe.addEventListener('load', function() {
          document.getElementById('gameLoading').classList.add('hidden');
        });
      } else {
        fetch(game.file)
          .then(function(r) { return r.text(); })
          .then(function(rawCode) {
            // Step 1: Strip import/export before Babel sees it
            var stripped = stripModuleSyntax(rawCode);
            var cleanCode = stripped.code;
            var componentName = stripped.defaultExport;

            // Step 2: Transform JSX only (no module handling needed)
            var transformed = Babel.transform(cleanCode, {
              presets: ['react']
            }).code;

            // Step 3: Wrap in IIFE to avoid global scope conflicts + append render call
            var finalCode = '(function(React,ReactDOM,useState,useEffect,useRef,useCallback,useMemo,useReducer,useContext,createContext,memo,forwardRef,Fragment){\n' +
              transformed + '\n';
            if (componentName) {
              finalCode += 'var _root=ReactDOM.createRoot(document.getElementById("game-root"));' +
                '_root.render(React.createElement(' + componentName + '));\n';
            }
            finalCode += '})(React,ReactDOM,React.useState,React.useEffect,React.useRef,React.useCallback,React.useMemo,React.useReducer,React.useContext,React.createContext,React.memo,React.forwardRef,React.Fragment);';

            // Step 4: Execute
            var script = document.createElement('script');
            script.textContent = finalCode;
            document.body.appendChild(script);

            document.getElementById('gameLoading').classList.add('hidden');
          })
          .catch(function(err) {
            console.error('Game load error:', err);
            document.getElementById('gameLoading').innerHTML =
              '<span style="color:#ff6b6b;font-size:0.82rem;">載入失敗</span>' +
              '<span style="color:#666;font-size:0.75rem;">' + err.message + '</span>' +
              '<a href="index.html" style="color:#c4a882;font-size:0.78rem;margin-top:8px;">回到大廳</a>';
          });
      }
    }

    function toggleFullscreen() {
      var el = document.getElementById('gameArea');
      if (!document.fullscreenElement) {
        (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen).call(el);
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
      }
    }
  </script>
</body>
</html>
