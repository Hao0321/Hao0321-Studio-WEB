function PactOfArcania(){
  const [scr,setScr]=useState("title");const [dk,setDk]=useState([]);const [disc,setDisc]=useState([]);

  const [elisSkip,setElisSkip]=useState({});// 埃莉絲下回合不能攻擊

  const addL=(m)=>setLog(p=>[...p.slice(-80),{m}]);

  const showFx=(type,value)=>{setFx({type,value,key:uid()});setTimeout(()=>setFx(null),1200);};

  // Ability helper - supports Odin copy
  const gAb=(idx)=>{const c=pls[idx]?.char;if(!c)return"";if(c.id==="odin"&&cpAb&&ci===idx)return cpAb;return c.id;};
  const defVal=(idx)=>gAb(idx)==="washington"?4:2;
  const nxA=(f,ps)=>{let i=(f+1)%ps.length,s=0;while(ps[i].hp<=0&&s<ps.length){i=(i+1)%ps.length;s++;}return i;};

  // Win check with undead revival
  const cW=(ps,d)=>{
    // Check undead revival
    ps.forEach((p,i)=>{
      if(p.hp<=0&&!revived[i]){
        const ab=p.char.id;
        if(ab==="dknight"){p.hp=4;addL("💀 死亡騎士復活！(4HP) 攻擊永久+2");setRevived(prev=>({...prev,[i]:true}));}
        else if(ab==="lichking"){p.hp=8;addL("👑 巫妖王復活！(8HP) 全體受2傷");ps.forEach((t,j)=>{if(j!==i&&t.hp>0){t.hp=Math.max(0,t.hp-2);addL("💥 "+t.char.n+" -2HP("+t.hp+")");}});setRevived(prev=>({...prev,[i]:true}));}
        else if(ab==="zombie"){p.hp=4;const atkC=d.find(c=>c.s==="a");if(atkC){p.hand.push(d.splice(d.indexOf(atkC),1)[0]);addL("🧟 僵屍復活+攻擊卡");}p.fld.push({k:"d",uid:uid()});addL("🧟 僵屍復活！(4HP)+防禦卡");setRevived(prev=>({...prev,[i]:true}));}
        // 骷髏法師: absorb dead player's hand
        if(p.hp<=0){const mage=ps.find((t,j)=>j!==i&&t.hp>0&&t.char.id==="skelemage");if(mage&&p.hand.length>0){mage.hand.push(...p.hand);p.hand=[];addL("💀 骷髏法師接收了"+p.char.n+"的手牌！");}}
      }
    });
    const al=ps.filter(p=>p.hp>0);
    if(al.length<=1){const wIdx=al[0]?.idx??0;setWin(wIdx);setScr("over");_haoReport(wIdx===0?Math.max(1,200-tn):0);return true;}
    if(d.length===0){const wIdx=al.reduce((a,b)=>a.hp>=b.hp?a:b).idx;setWin(wIdx);setScr("over");_haoReport(wIdx===0?Math.max(1,200-tn):0);return true;}
    return false;
  };

  const startDice=(label,cb)=>{let v=rl();setDice({v,label,spinning:true,cb});if(diceIv.current)clearInterval(diceIv.current);diceIv.current=setInterval(()=>{v=rl();setDice(prev=>prev?{...prev,v}:null);},80);};
  const stopDice=()=>{if(diceIv.current){clearInterval(diceIv.current);diceIv.current=null;}setDice(prev=>{if(!prev)return null;const v=prev.v,cb=prev.cb;setTimeout(()=>{setDice(null);if(cb)cb(v);},700);return{...prev,spinning:false,cb:null};});};

  // Calc attack damage with all ability modifiers
  const calcDmg=(baseDmg,atkIdx,ps,cm)=>{
    let dmg=baseDmg;const ab=gAb(atkIdx);
    if(ab==="mulan"&&ps[atkIdx].hp<=5&&!ps[atkIdx].fld.some(f=>f.k==="d")){dmg*=2;addL("🏹 絕境反擊！雙倍！");}
    if(ab==="elis"){dmg+=2;addL("✨ 精靈之力+2");setElisSkip(prev=>({...prev,[atkIdx]:true}));}
    if(ab==="azazel"&&ps.every(p=>p.hp<=0||p.fld.filter(f=>f.k==="d").length===0)){dmg+=2;addL("👿 黑暗之力+2");}
    if(ab==="eri"&&ps[atkIdx].hp<=5){dmg+=2;addL("😈 魔族之怒+2");}
    if(ab==="dknight"&&revived[atkIdx]){dmg+=2;addL("💀 死亡之力+2");}
    if(ab!=="zeus"&&cm[atkIdx]>0){dmg+=cm[atkIdx];addL("🔮 護符+"+cm[atkIdx]);cm[atkIdx]=0;}
    return dmg;
  };

  // Draw
  const drDk=(cnt,d,hand,ps,si)=>{
    const dk2=[...d],h=[...hand],ps2=ps.map(p=>({...p,hand:[...p.hand],fld:[...p.fld]})),logs=[];let drawn=0;const fatesDrawn=[];
    while(drawn<cnt&&dk2.length>0){const c=dk2.shift();
      if(c.t==="F"){drawn++;if(si===0){h.push(c);fatesDrawn.push(c);logs.push("🌀 命運卡【"+c.n+"】！");}
        else{logs.push("🌀 "+ps2[si].char.n+"【"+c.n+"】");
          if(c.id==="st"){ps2.forEach(p=>{if(p.hp<=0)return;for(let x=0;x<2;x++)if(p.hand.length>0)p.hand.splice(Math.random()*p.hand.length|0,1);});}
          else if(c.id==="sl"){const ot=ps2.filter((p,i2)=>i2!==si&&p.hp>0&&p.hand.length>0);if(ot.length>0){const t=ot[Math.random()*ot.length|0];ps2[si].hand.push(t.hand.splice(Math.random()*t.hand.length|0,1)[0]);}}
          else if(c.id==="ti"){ps2.forEach(p=>{if(p.hp<=0)return;for(let x=0;x<2;x++)if(dk2.length>0){let cc=dk2.shift();while(cc&&cc.t==="F")cc=dk2.length>0?dk2.shift():null;if(cc)p.hand.push(cc);}});}
          else if(c.id==="bm"){setBmM(prev=>({...prev,[si]:true}));}}}
      else{h.push(c);drawn++;}}
    ps2[si].hand=h;return{deck:dk2,players:ps2,logs,fatesDrawn};
  };

  // Resolve attack with ALL character abilities
  const rAtk=(dmg,atkIdx,defIdx,ps,dd)=>{
    const logs=[];const def={...ps[defIdx],fld:[...ps[defIdx].fld],hand:[...ps[defIdx].hand]};const atk={...ps[atkIdx],hand:[...ps[atkIdx].hand]};const d2=[...dd];
    logs.push("⚔️ "+atk.char.n+" → "+def.char.n+"（"+dmg+"點）");
    const dAb=gAb(defIdx);const aAb=gAb(atkIdx);

    // 幽靈: roll to dodge (1,6)
    if(dAb==="ghost"){const gv=rl();if(gv===1||gv===6){logs.push("👻 靈能迴避！骰"+gv+"，閃避成功！");const ps2=[...ps];ps2[defIdx]=def;ps2[atkIdx]=atk;return{ps:ps2,logs,disc:d2};}}
    // 杜林: no field defense → auto play from hand
    if(dAb==="durin"&&!def.fld.some(f=>f.k==="d")){const hDef=def.hand.findIndex(c=>c.s==="d");if(hDef>=0){const dc=def.hand.splice(hDef,1)[0];def.fld.push({k:"d",uid:uid()});d2.push(dc);logs.push("🛡️ 鋼鐵之力：從手牌打出防禦卡！");}}
    // 艾隆: discard to reduce 2
    if(dAb==="elron"&&def.hand.length>0){const dc=def.hand.splice(Math.random()*def.hand.length|0,1)[0];d2.push(dc);dmg=Math.max(0,dmg-2);logs.push("🍃 自然守護：棄牌減2傷("+dmg+")");}
    // 法夫尼爾: 4+ dmg, roll even = half
    if(dAb==="fafnir"&&dmg>=4){const fv=rl();if(fv%2===0){dmg=Math.ceil(dmg/2);logs.push("🐲 力量收縮！骰"+fv+"，傷害減半("+dmg+")");}}
    // 艾瑞莎: odd roll = ignore defense
    let ignDef=false;if(aAb==="arisa"){const av=rl();if(av%2===1){ignDef=true;logs.push("🏹 精靈之箭！骰"+av+"，無視防禦！");}else{logs.push("🏹 骰"+av+"，正常攻擊");}}
    // 巴哈姆特: destroy 1 defense

    let remaining=dmg;const dv=defVal(defIdx);

        // 巴林: gain attack bonus from destroyed defense

        if(dAb==="leviathan"&&atk.fld.some(f=>f.k==="d")){atk.fld.splice(atk.fld.findIndex(f=>f.k==="d"),1);logs.push("🌊 海龍之力：破壞攻擊者防禦！");}
      }else{logs.push("🔰 防禦吸收"+remaining+"（未破壞）");remaining=0;}}}
    else{logs.push("⚡ 無視防禦直接攻擊！");}

    if(remaining>0){def.hp=Math.max(0,def.hp-remaining);logs.push("❤️‍🔥 "+def.char.n+" -"+remaining+"HP（"+def.hp+"/"+def.mhp+"）");
      if(defIdx===0)showFx("hit",remaining);
      // 菲力: reflect 1 damage

      if(dAb==="anubis"&&def.fld.filter(f=>f.k==="d").length<2){def.fld.push({k:"d",uid:uid()});logs.push("🐺 亡者守護");}
      if(dAb==="artemis"&&atk.hand.length>0){def.hand.push(atk.hand.splice(Math.random()*atk.hand.length|0,1)[0]);logs.push("🌙 偷取1牌");}
      // 索林: successful attack → get atk card from discard

        <div style={{display:"flex",gap:2,alignItems:"center"}}>{p.fld.map(f=>(<div key={f.uid} style={{width:18,height:20,borderRadius:4,background:"#4A90D908",border:"1px solid #4A90D928",fontSize:8,display:"flex",alignItems:"center",justifyContent:"center"}}>🔰</div>))}{bmM[p.idx]&&<span style={{fontSize:12,animation:"bombTick 1s infinite"}}>💣</span>}<span style={{fontSize:8,color:"#2A2438",marginLeft:"auto"}}>{p.hand.length}</span></div></div>))}</div>

      <div ref={logR} style={{flex:1,padding:"6px 12px",overflowY:"auto",minHeight:70,maxHeight:160,background:bg}}>{log.map((l,i)=>{let clr="#585068";if(l.m.includes("❤️‍🔥")||l.m.includes("💀")||l.m.includes("💥"))clr=red;else if(l.m.includes("💊")||l.m.includes("💚")||l.m.includes("HP"))clr=grn;else if(l.m.includes("🌀")||l.m.includes("💣"))clr="#9060D0";else if(l.m.includes("⚔️")||l.m.includes("🏹"))clr="#E8945A";else if(l.m.includes("🤖"))clr="#484058";else if(l.m.includes("────"))clr="#1C1830";return(<div key={i} style={{fontSize:10,lineHeight:1.7,color:clr,fontWeight:l.m.includes("⚔️")?700:400}}>{l.m}</div>);})}</div>

      {ph==="respond"&&pend&&(<div style={{padding:"14px 16px",background:"linear-gradient(180deg,#D8484815,"+bg+")",borderTop:"2px solid #D8484830"}}><div style={{fontSize:13,fontWeight:800,color:red,marginBottom:10,textAlign:"center"}}>⚠️ {pend.dmg}點攻擊！</div><div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",alignItems:"center"}}>{pls[0].hand.filter(c=>c.s==="c"||c.id==="sh").map(c=>(<Cd key={c.uid} card={c} onClick={resC} sm hl/>))}<Bt onClick={skRes} color="#585068">承受</Bt></div></div>)}

      <div style={{borderTop:"1px solid "+bd,background:pn,padding:"8px 12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><div style={{fontSize:24}}>{pls[0].char.i}</div><div style={{flex:1}}><div style={{fontSize:12,fontWeight:800,color:pls[0].char.c}}>👤 {pls[0].char.n} <span style={{fontSize:8,color:"#484058"}}>{pls[0].char.p}</span></div><HB hp={pls[0].hp} mx={pls[0].mhp} clr={pls[0].char.c} big/></div></div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>{pls[0].fld.map(f=>(<div key={f.uid} style={{width:24,height:28,borderRadius:6,background:"#4A90D910",border:"1px solid #4A90D935",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>🔰</div>))}{bmM[0]&&<span style={{fontSize:16,animation:"bombTick 1s infinite"}}>💣</span>}{chm[0]>0&&<span style={{fontSize:10,color:"#E8A020",background:"#E8A02012",padding:"2px 8px",borderRadius:6}}>🔮+{chm[0]}</span>}{elisSkip[0]&&<span style={{fontSize:9,color:"#D04040",background:"#D0404012",padding:"2px 6px",borderRadius:6}}>⛔攻擊封印</span>}</div>
      </div>
      <div style={{padding:"8px 6px 12px",background:bg,borderTop:"1px solid "+bd,overflowX:"auto"}}><div style={{display:"flex",gap:6,minHeight:114}}>{pls[0].hand.map(c=>{const cp=canP(c);return(<Cd key={c.uid} card={c} dim={!cp} onClick={ph==="respond"?(cp?resC:null):cp?(cuid)=>{if(c.s==="a"&&c.id!=="aa"){setSel(cuid);playC(cuid,null);}else playC(cuid,null);}:()=>setSel(c.uid===sel?null:c.uid)}/>);})}</div></div>
      <div style={{padding:"8px 14px 18px",background:bg,display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
        {ph==="draw"&&ci===0&&<Bt onClick={doDraw} color="#4A90D9" disabled={am} flex big>📥 抽牌</Bt>}
        {ph==="action"&&ci===0&&(<>{ab2==="alexander"&&!axU&&pls[0].hand.filter(c=>c.t!=="F").length>0&&dk.length>0&&<Bt onClick={alexS} color="#E8945A">🗡️ 換牌</Bt>}{ab2==="kili"&&!axU&&pls[0].hand.filter(c=>c.t!=="F").length>0&&<Bt onClick={kiliS} color="#B08030">⚒️ 鍛造</Bt>}{ab2==="yage"&&!axU&&pls[0].hand.filter(c=>c.t!=="F").length>0&&pls[0].hp<pls[0].mhp&&<Bt onClick={yageS} color="#B03080">💀 棄牌治癒</Bt>}{ab2==="yalo"&&!axU&&<Bt onClick={yaloS} color="#38A858">💚 治癒隊友</Bt>}<Bt onClick={()=>tryEnd()} flex big>結束回合</Bt></>)}
        {ci!==0&&ph!=="respond"&&<div style={{color:"#2A2438",fontSize:12,padding:12,animation:"pulse2 1.5s infinite"}}>🤖 思考中...</div>}
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(PactOfArcania), document.getElementById('root'));
</script>

<!-- Auto ads handles placement -->
</body>
</html>
