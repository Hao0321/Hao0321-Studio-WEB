  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #F4F4F7;
      color: #0F0F1E;
      font-family: 'Plus Jakarta Sans', 'Noto Sans TC', system-ui, sans-serif;
      min-height: 100vh;

        radial-gradient(ellipse 900px 650px at 12% 3%, rgba(195,215,255,0.40), transparent 60%),
        radial-gradient(ellipse 700px 560px at 88% 28%, rgba(180,190,240,0.22), transparent 60%);

    }

    /* Studio Topbar — pill nav 風格 */
    .studio-bar {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      width: min(calc(100% - 32px), 720px); z-index: 1100;
      padding: 8px 8px 8px 22px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(15,15,30,0.06);
      border-radius: 9999px;
      box-shadow: 0 2px 8px rgba(15,15,30,0.04), 0 8px 24px rgba(15,15,30,0.06);
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .studio-bar-left { display: flex; align-items: center; gap: 10px; }
    .studio-bar-link {
      display: flex; align-items: center; gap: 10px;
      color: #0F0F1E; text-decoration: none;
      font-size: 14px; font-weight: 700;
    }
    .studio-bar-logo {
      width: 26px; height: 26px;
      background: linear-gradient(135deg, #4A7BF5 0%, #8E7CF0 100%);
      border-radius: 7px;
      display: grid; place-items: center;
      font-size: 13px; font-weight: 800; color: #fff;
      box-shadow: 0 2px 6px rgba(74,123,245,0.3);
    }
    .studio-bar-sep { color: rgba(15,15,30,0.15); font-size: 12px; }
    .studio-bar-sub {
      color: #4A4A5E; font-size: 13px; font-weight: 500;
      padding: 8px 16px; border-radius: 9999px;
      background: rgba(74,123,245,0.06);
    }

    /* Loading */
    .loading-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #F4F4F7;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      transition: opacity 0.4s;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; display: none; }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(74,123,245,0.15);
      border-top-color: #4A7BF5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #8C8CA0; font-size: 13px; letter-spacing: 0.1em; font-family: 'JetBrains Mono', monospace; }

    /* App root */
    #pipeline-root { padding-top: 100px; min-height: 100vh; }

    /* CTA Footer */
    .cta-footer {
      background: #FFFFFF;
      border-top: 1px solid rgba(15,15,30,0.06);
      padding: 60px 24px;
      text-align: center;
      position: relative; z-index: 1;
    }
    .cta-footer h3 {
      font-size: 1.5rem; font-weight: 800; color: #0F0F1E;
      margin-bottom: 8px; letter-spacing: -0.01em;
    }
    .cta-footer p {
      color: #4A4A5E; font-size: 0.95rem;
      max-width: 480px; margin: 0 auto 32px; line-height: 1.7;
    }
    .cta-buttons { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px; border-radius: 12px;
      font-size: 0.92rem; font-weight: 700;
      text-decoration: none; transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
      position: relative; overflow: hidden;
    }
    .cta-btn-discord { background: #5865F2; color: #fff; }
    .cta-btn-discord:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 12px 32px rgba(88,101,242,0.4);
    }
    .cta-btn-youtube { background: #FF0000; color: #fff; }
    .cta-btn-youtube:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 12px 32px rgba(255,0,0,0.3);
    }
    .cta-btn:active { transform: translateY(0) scale(0.96) !important; transition: transform 0.1s; }
    .cta-btn svg { flex-shrink: 0; }

    @media (max-width: 640px) {
      .studio-bar { top: 12px; padding: 6px 6px 6px 16px; }
      .studio-bar-link { font-size: 13px; }
      .studio-bar-sub { font-size: 12px; padding: 6px 12px; }
      #pipeline-root { padding-top: 80px; }
    }

<body>

  <!-- CTA Footer -->

    <div class="cta-buttons">

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.2/babel.min.js" crossorigin="anonymous"></script>

  <script>
    "use strict";
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    window.useRef = React.useRef;
    window.useCallback = React.useCallback;
    window.useMemo = React.useMemo;
    window.useReducer = React.useReducer;
    window.useContext = React.useContext;
    window.createContext = React.createContext;
    window.memo = React.memo;
    window.forwardRef = React.forwardRef;
    window.Fragment = React.Fragment;

    function stripModuleSyntax(code) {
      code = code.replace(/^\s*import\s+\{[^}]*\}\s+from\s+["'][^"']*["'];?\s*$/gm, '');
      code = code.replace(/^\s*import\s+["'][^"']*["'];?\s*$/gm, '');
      var defaultExportName = null;
      code = code.replace(/export\s+default\s+function\s+(\w+)/g, function(m, name) {
        defaultExportName = name; return 'function ' + name;
      });
      code = code.replace(/export\s+default\s+class\s+(\w+)/g, function(m, name) {
        defaultExportName = name; return 'class ' + name;
      });
      if (!defaultExportName) {
        code = code.replace(/export\s+default\s+(\w+)\s*;?/g, function(m, name) {
          defaultExportName = name; return '';
        });
      }
      code = code.replace(/^\s*export\s*\{[^}]*\}\s*;?\s*$/gm, '');
      code = code.replace(/export\s+(function|const|let|var|class)\s/g, '$1 ');
      return { code: code, defaultExport: defaultExportName };
    }

    fetch('pipeline.jsx')
      .then(function(r) { return r.text(); })
      .then(function(rawCode) {
        var stripped = stripModuleSyntax(rawCode);
        var cleanCode = stripped.code;
        var componentName = stripped.defaultExport;

        var transformed = Babel.transform(cleanCode, { presets: ['react'] }).code;

        var finalCode = '(function(React,ReactDOM,useState,useEffect,useRef,useCallback,useMemo,useReducer,useContext,createContext,memo,forwardRef,Fragment){\n' +
          transformed + '\n';
        if (componentName) {
          finalCode += 'var _root=ReactDOM.createRoot(document.getElementById("pipeline-root"));' +
            '_root.render(React.createElement(' + componentName + '));\n';
        }
        finalCode += '})(React,ReactDOM,React.useState,React.useEffect,React.useRef,React.useCallback,React.useMemo,React.useReducer,React.useContext,React.createContext,React.memo,React.forwardRef,React.Fragment);';

        var script = document.createElement('script');
        script.textContent = finalCode;
        document.body.appendChild(script);

        document.getElementById('loadingScreen').classList.add('hidden');
      })
      .catch(function(err) {
        console.error('Pipeline load error:', err);
        var box = document.getElementById('loadingScreen');
        while (box.firstChild) box.removeChild(box.firstChild);
        var s1 = document.createElement('span');
        s1.style.cssText = 'color:#dc2626;font-size:0.95rem;font-weight:700';
        s1.textContent = '載入失敗';
        var s2 = document.createElement('span');
        s2.style.cssText = 'color:#8C8CA0;font-size:0.85rem;font-family:monospace';
        s2.textContent = err && err.message ? err.message : '';
        var a = document.createElement('a');
        a.href = '../';
        a.style.cssText = 'color:#4A7BF5;font-size:0.88rem;margin-top:12px;text-decoration:none;font-weight:500';
        a.textContent = '← 回到首頁';
        box.appendChild(s1); box.appendChild(s2); box.appendChild(a);
      });
  </script>
