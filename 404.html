<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Hao0321 Studio</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;font-family:'Space Grotesk','Noto Sans TC',sans-serif;color:#1a1a2e;background-image:linear-gradient(rgba(0,0,0,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.05) 1px,transparent 1px);background-size:32px 32px}
    .wrap{text-align:center;padding:40px 24px}
    .code{font-size:clamp(5rem,15vw,10rem);font-weight:900;line-height:1;background:linear-gradient(135deg,#a855f7,#ff1493);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    h1{font-size:1.4rem;font-weight:700;margin:16px 0 12px}
    p{color:#555;font-size:.92rem;margin-bottom:32px}
    a{display:inline-flex;align-items:center;gap:8px;padding:12px 32px;border-radius:100px;background:#ff1493;color:#fff;text-decoration:none;font-weight:700;font-size:.88rem;transition:transform .3s,box-shadow .3s}
    a:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,20,147,0.25)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>找不到這個頁面</h1>
    <p>你要找的頁面不存在或已經移動了。</p>
    <a href="/">回到首頁</a>
  </div>
</body>
</html>
